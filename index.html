<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek Chat</title>
    <meta name="description" content="DeepSeek AI 聊天助手">
    <style>
        :root {
            --bg-primary: #0f0f0f;--bg-secondary: #1a1a1a;--bg-tertiary: #0a0a0a;--border-color: #2a2a2a;
            --text-primary: #e0e0e0;--text-secondary: #8e8e8e;--text-muted: #6b6b6b;
            --accent: #10a37f;--accent-hover: #0d8c6d;--warning: #ffb74d;--danger: #ef5350;
            --wechat-green: #95EC69;--wechat-white: #FFFFFF;--wechat-bg: #ededed;
            --radius-sm: 8px;--radius-md: 10px;--radius-lg: 16px;--radius-xl: 28px;--transition: 0.2s ease;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary);color:var(--text-primary);-webkit-tap-highlight-color:transparent;user-select:none;}
        .app{display:flex;height:100%;width:100%;overflow:hidden;position:relative;}
        .sidebar{width:280px;background:var(--bg-tertiary);display:flex;flex-direction:column;border-right:1px solid var(--border-color);transition:transform var(--transition);z-index:20;height:100%;flex-shrink:0;}
        .sidebar-header{padding:16px 12px;flex-shrink:0;}
        .new-chat-btn{width:100%;padding:12px 16px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background var(--transition);}
        .new-chat-btn:hover{background:#252525;}
        .history-list{flex:1;padding:8px 12px;overflow-y:auto;overflow-x:hidden;}
        .history-list::-webkit-scrollbar{width:4px;}.history-list::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:2px;}
        .history-date{padding:12px 8px 4px;font-size:12px;color:var(--text-muted);font-weight:500;}
        .history-item{padding:10px 12px;margin:2px 0;border-radius:var(--radius-md);color:#d0d0d0;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background var(--transition);}
        .history-item:hover{background:var(--bg-secondary);}.history-item.active{background:var(--bg-secondary);color:var(--accent);}
        .history-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
        .delete-chat{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px;opacity:0;transition:opacity var(--transition),color var(--transition);flex-shrink:0;}
        .history-item:hover .delete-chat{opacity:1;}.delete-chat:hover{color:var(--danger);}
        .sidebar-footer{padding:16px;border-top:1px solid var(--border-color);display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
        .sidebar-btn{width:100%;padding:10px;background:transparent;border:none;border-radius:var(--radius-md);color:var(--text-secondary);font-size:14px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all var(--transition);}
        .sidebar-btn:hover{background:var(--bg-secondary);color:var(--text-primary);}.sidebar-btn.active-style{background:var(--bg-secondary);color:var(--accent);}
        .backup-buttons{display:flex;gap:8px;margin-top:4px;}
        .backup-btn{flex:1;padding:8px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-secondary);font-size:12px;cursor:pointer;text-align:center;transition:all var(--transition);}
        .backup-btn:hover{background:#2a2a2a;color:var(--text-primary);}
        .main{flex:1;display:flex;flex-direction:column;background:var(--bg-primary);min-width:0;height:100%;overflow:hidden;position:relative;}
        .main-menu-btn{position:absolute;top:12px;left:12px;z-index:10;background:rgba(0,0,0,0.5);border:none;color:var(--text-primary);font-size:20px;cursor:pointer;width:36px;height:36px;border-radius:var(--radius-sm);display:none;align-items:center;justify-content:center;flex-shrink:0;backdrop-filter:blur(4px);}
        .main-menu-btn:hover{background:rgba(0,0,0,0.7);}
        .chat-header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-color);flex-shrink:0;gap:12px;}
        .header-left{display:flex;align-items:center;gap:12px;min-width:0;}
        .header-title{display:flex;align-items:center;gap:8px;color:var(--text-primary);font-weight:500;min-width:0;}
        .model-tag{font-size:12px;color:var(--text-muted);background:var(--bg-secondary);padding:2px 8px;border-radius:12px;flex-shrink:0;}
        .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
        .header-actions{display:flex;gap:6px;}
        .header-action-btn{background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-secondary);cursor:pointer;font-size:11px;padding:5px 10px;border-radius:16px;transition:all var(--transition);white-space:nowrap;display:flex;align-items:center;gap:4px;}
        .header-action-btn:hover{background:#2a2a2a;color:var(--text-primary);}
        .token-stats{display:flex;align-items:center;gap:8px;background:var(--bg-secondary);padding:6px 14px;border-radius:20px;font-size:12px;white-space:nowrap;}
        .token-used{color:var(--accent);}.token-remaining{color:var(--warning);}
        .token-reset{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0 4px;transition:color var(--transition);}
        .token-reset:hover{color:var(--text-primary);}
        .context-bar{height:3px;background:var(--border-color);flex-shrink:0;position:relative;}
        .context-bar-fill{height:100%;background:var(--accent);transition:width 0.5s ease,background 0.3s ease;}
        .context-bar-fill.warning{background:var(--warning);}.context-bar-fill.danger{background:var(--danger);}
        .wechat-header{display:none;padding:12px 50px;text-align:center;flex-shrink:0;position:relative;z-index:5;background:var(--wechat-bg);border-bottom:1px solid #d9d9d9;}
        .wechat-header .chat-note{font-size:16px;font-weight:600;color:#000;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background var(--transition);}
        .wechat-header .chat-note:hover{background:rgba(0,0,0,0.05);}
        .wechat-header .chat-note-input{font-size:16px;font-weight:600;color:#000;background:transparent;border:none;border-bottom:1px solid var(--accent);text-align:center;outline:none;width:60%;font-family:inherit;}
        .messages-container{flex:1;overflow-y:auto;padding:20px 0;min-height:0;scroll-behavior:smooth;background:var(--bg-primary);}
        .messages-container::-webkit-scrollbar{width:6px;}.messages-container::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px;}
        .messages-container.wechat-bg{background-color:var(--wechat-bg);background-size:cover;background-position:center;background-repeat:no-repeat;}
        .welcome-message{text-align:center;padding:80px 20px;}
        .welcome-message h1{color:var(--text-primary);font-size:28px;margin-bottom:12px;}.welcome-message p{color:var(--text-muted);font-size:15px;}
        .wechat-bg .welcome-message h1{color:#000;}.wechat-bg .welcome-message p{color:#888;}
        .message{display:flex;padding:20px 16px;animation:fadeIn 0.3s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        .message.user{background:var(--bg-primary);}.message.assistant{background:var(--bg-secondary);}
        .message-content{max-width:800px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:8px;}
        .message-row{display:flex;gap:12px;width:100%;}
        .avatar{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:default;transition:all var(--transition);}
        .message.user .avatar{background:var(--accent);}
        .message.assistant .avatar{background:#2a2a2a;cursor:pointer;}
        .message.assistant .avatar:hover{background:#3a3a3a;transform:scale(1.1);}
        .message.assistant .avatar.has-persona{border:2px solid var(--accent);}
        .text{flex:1;color:var(--text-primary);line-height:1.6;font-size:15px;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:break-word;}
        .text code{background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono','Monaco',monospace;}
        .text pre{background:#0a0a0a;padding:12px;border-radius:var(--radius-sm);overflow-x:auto;margin:8px 0;border:1px solid var(--border-color);}.text pre code{background:none;padding:0;}
        .message.wechat-msg{display:flex;padding:8px 16px;animation:fadeIn 0.3s ease;background:transparent;}
        .message.wechat-msg.user{justify-content:flex-end;}.message.wechat-msg.assistant{justify-content:flex-start;}
        .wechat-time-divider{text-align:center;padding:8px 0;}
        .wechat-time-divider span{font-size:11px;color:#b0b0b0;background:rgba(0,0,0,0.1);padding:3px 10px;border-radius:3px;}
        .wechat-bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:break-word;position:relative;}
        .message.wechat-msg.user .wechat-bubble{background:var(--wechat-green);color:#000;border-top-right-radius:4px;}
        .message.wechat-msg.assistant .wechat-bubble{background:var(--wechat-white);color:#000;border-top-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,0.1);}
        .wechat-avatar{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin:0 8px;}
        .message.wechat-msg.user .wechat-avatar{background:var(--accent);order:2;}
        .message.wechat-msg.assistant .wechat-avatar{background:#d0d0d0;order:0;cursor:pointer;}
        .message.wechat-msg.assistant .wechat-avatar.has-persona{border:2px solid var(--accent);}
        .wechat-bubble .bubble-actions{display:flex;gap:4px;margin-top:6px;justify-content:flex-end;}
        .wechat-bubble .bubble-btn{background:transparent;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;opacity:0.6;transition:all var(--transition);color:inherit;}
        .wechat-bubble .bubble-btn:hover{opacity:1;background:rgba(0,0,0,0.1);}
        .divider{display:flex;align-items:center;gap:10px;padding:12px 16px;max-width:800px;margin:0 auto;width:100%;}
        .divider-line{flex:1;height:1px;background:var(--border-color);}.divider-text{font-size:11px;color:var(--text-muted);white-space:nowrap;}
        .wechat-bg .divider-text{color:#888;}.wechat-bg .divider-line{background:#d9d9d9;}
        .file-attachment{display:inline-flex;align-items:center;gap:8px;background:#1e1e1e;border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:8px 12px;margin-top:4px;font-size:13px;color:var(--text-secondary);}
        .file-attachment .file-name{color:var(--text-primary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.file-attachment .file-size{color:var(--text-muted);font-size:11px;}
        .message-actions{display:flex;gap:8px;margin-left:44px;margin-top:6px;flex-wrap:wrap;align-items:center;}
        .action-btn{background:#2a2a2a;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:6px 14px;border-radius:20px;transition:all var(--transition);}
        .action-btn:hover{background:#3a3a3a;color:var(--text-primary);}.action-btn.copy-success{background:var(--accent);color:white;}
        .version-switcher{display:inline-flex;align-items:center;gap:6px;background:#2a2a2a;border-radius:20px;padding:4px 8px;font-size:12px;}
        .version-switcher .ver-btn{background:transparent;border:none;color:var(--text-secondary);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:all var(--transition);}
        .version-switcher .ver-btn:hover{color:var(--text-primary);background:#3a3a3a;}
        .version-switcher .ver-btn:disabled{opacity:0.3;cursor:not-allowed;}.version-switcher .ver-info{color:var(--text-muted);min-width:40px;text-align:center;}
        .branch-indicator{display:inline-flex;align-items:center;gap:4px;background:rgba(255,183,77,0.15);color:var(--warning);font-size:11px;padding:4px 10px;border-radius:12px;}
        .context-menu{position:fixed;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-md);z-index:3000;min-width:140px;box-shadow:0 8px 30px rgba(0,0,0,0.5);display:none;animation:fadeIn 0.15s ease;}
        .context-menu.active{display:block;}
        .context-menu-item{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text-primary);display:flex;align-items:center;gap:8px;transition:background var(--transition);}
        .context-menu-item:hover{background:#2a2a2a;}
        .context-menu-item:first-child{border-radius:var(--radius-md) var(--radius-md) 0 0;}
        .context-menu-item:last-child{border-radius:0 0 var(--radius-md) var(--radius-md);}
        .edit-textarea{width:100%;background:var(--bg-secondary);border:1px solid var(--accent);border-radius:12px;color:var(--text-primary);font-size:15px;font-family:inherit;padding:12px;resize:vertical;min-height:60px;line-height:1.5;}
        .edit-textarea:focus{outline:none;box-shadow:0 0 0 2px rgba(16,163,127,0.3);}
        .edit-actions{display:flex;gap:10px;margin-top:10px;}
        .edit-save{background:var(--accent);border:none;padding:8px 20px;border-radius:25px;color:white;cursor:pointer;font-size:13px;}
        .edit-cancel{background:#2a2a2a;border:none;padding:8px 20px;border-radius:25px;color:var(--text-secondary);cursor:pointer;font-size:13px;}
        .input-area{padding:12px 16px 20px;background:var(--bg-primary);flex-shrink:0;border-top:1px solid var(--border-color);}
        .input-area.wechat-input-area{background:var(--wechat-bg);border-top:1px solid #d9d9d9;}
        .input-wrapper{max-width:800px;margin:0 auto;}
        .input-wrapper.drag-over .input-box{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,163,127,0.2);}
        .file-preview-area{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;max-width:800px;margin-left:auto;margin-right:auto;}
        .file-preview-item{display:inline-flex;align-items:center;gap:6px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;animation:fadeIn 0.2s ease;}
        .wechat-input-area .file-preview-item{background:#fff;border-color:#d9d9d9;color:#000;}
        .file-preview-item .fp-name{color:var(--text-primary);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .wechat-input-area .file-preview-item .fp-name{color:#000;}.file-preview-item .fp-size{color:var(--text-muted);font-size:10px;}
        .file-preview-item .fp-remove{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:1px 4px;border-radius:3px;}
        .file-preview-item .fp-remove:hover{color:var(--danger);}
        .input-box{position:relative;}
        .input-box textarea{width:100%;padding:12px 48px 12px 40px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-xl);color:var(--text-primary);font-size:15px;font-family:inherit;resize:none;outline:none;line-height:1.5;max-height:120px;transition:border-color var(--transition);}
        .input-box.wechat-input-box textarea{background:#fff;border:1px solid #d9d9d9;color:#000;border-radius:24px;padding:10px 48px 10px 40px;}
        .input-box textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(16,163,127,0.15);}
        .attach-btn{position:absolute;left:8px;bottom:8px;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
        .attach-btn:hover{color:var(--accent);background:rgba(16,163,127,0.1);}
        .send-btn{position:absolute;right:8px;bottom:8px;background:#2a2a2a;border:none;width:32px;height:32px;border-radius:50%;color:var(--text-secondary);cursor:pointer;font-size:16px;transition:all var(--transition);display:flex;align-items:center;justify-content:center;}
        .wechat-input-box .send-btn{background:var(--accent);color:#fff;}
        .send-btn:hover{background:var(--accent);color:white;}.send-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .disclaimer{text-align:center;font-size:11px;color:#4a4a4a;margin-top:8px;}.wechat-input-area .disclaimer{color:#999;}
        .typing-indicator{display:flex;gap:4px;padding:4px 0;}
        .typing-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);animation:typingBounce 1.4s ease-in-out infinite;}
        .typing-dot:nth-child(2){animation-delay:0.2s;}.typing-dot:nth-child(3){animation-delay:0.4s;}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-8px);opacity:1;}}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;animation:fadeIn 0.2s ease;}
        .modal-overlay.active{display:flex;}
        .modal-card{background:var(--bg-secondary);border-radius:var(--radius-lg);width:460px;max-width:90%;max-height:85vh;overflow-y:auto;border:1px solid var(--border-color);box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:slideUp 0.2s ease;}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
        .modal-header{padding:16px 20px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;}
        .modal-header h3{color:var(--text-primary);font-size:18px;}
        .modal-close{background:transparent;border:none;color:var(--text-secondary);font-size:24px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
        .modal-close:hover{background:#2a2a2a;color:var(--text-primary);}
        .modal-body{padding:20px;}.modal-body label{display:block;color:var(--text-secondary);font-size:13px;margin:12px 0 6px;}
        .modal-body input,.modal-body textarea{width:100%;padding:12px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;font-family:inherit;transition:border-color var(--transition);}
        .modal-body textarea{resize:vertical;min-height:80px;}
        .modal-body input:focus,.modal-body textarea:focus{outline:none;border-color:var(--accent);}
        .modal-body .btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
        .btn-primary{flex:1;min-width:80px;padding:10px 16px;background:var(--accent);border:none;border-radius:var(--radius-md);color:white;cursor:pointer;font-size:13px;font-weight:500;transition:background var(--transition);}
        .btn-primary:hover{background:var(--accent-hover);}
        .btn-secondary{flex:1;min-width:80px;padding:10px 16px;background:#2a2a2a;border:none;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;font-size:13px;transition:background var(--transition);}
        .btn-secondary:hover{background:#3a3a3a;}
        .btn-warning{flex:1;min-width:80px;padding:10px 16px;background:var(--warning);border:none;border-radius:var(--radius-md);color:#000;cursor:pointer;font-size:13px;font-weight:500;}
        .btn-warning:hover{opacity:0.85;}
        .hint{font-size:11px;color:#4a4a4a;margin-top:12px;text-align:center;line-height:1.4;}
        .shortcut-row{display:flex;align-items:center;gap:8px;margin:8px 0;}
        .shortcut-row select{flex:1;padding:8px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;}
        .shortcut-row select:focus{outline:none;border-color:var(--accent);}
        .modal-stats{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg-primary);border-radius:var(--radius-md);margin-top:12px;font-size:12px;}
        .modal-stats .stat-item{display:flex;align-items:center;gap:4px;}
        .modal-context-bar{height:4px;background:var(--border-color);border-radius:2px;margin-top:8px;overflow:hidden;}
        .modal-context-bar-fill{height:100%;background:var(--accent);transition:width 0.3s ease;}
        .modal-context-bar-fill.warning{background:var(--warning);}.modal-context-bar-fill.danger{background:var(--danger);}
        .bg-preview{width:100%;height:60px;border-radius:var(--radius-sm);background-size:cover;background-position:center;margin-top:8px;border:1px solid var(--border-color);position:relative;}
        .bg-preview::after{content:'拖拽图片到此处更换';display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:12px;}
        .bg-preview[style*="url"]::after{display:none;}
        #importFile,#chatFileInput,#bgImageInput{display:none;}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 24px;border-radius:20px;font-size:14px;z-index:2000;animation:fadeIn 0.3s ease;pointer-events:none;}
        .drag-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;background:rgba(16,163,127,0.08);pointer-events:none;align-items:center;justify-content:center;font-size:24px;color:var(--accent);}
        .drag-overlay.active{display:flex;}
        @media(max-width:768px){
            .main-menu-btn{display:flex;}
            .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);box-shadow:none;width:280px;}
            .sidebar.mobile-visible{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.5);}

    <div id="summaryEditModal" class="modal-overlay"><div class="modal-card"><div class="modal-header"><h3>📝 确认摘要</h3><button class="modal-close" id="summaryEditCloseBtn">&times;</button></div><div class="modal-body"><p style="color:var(--text-secondary);font-size:13px;margin-bottom:8px;">AI 已生成摘要，你可以修改后确认：</p><textarea id="summaryEditInput" rows="8"></textarea><label for="summaryEditExtra">额外补充（可选）</label><textarea id="summaryEditExtra" placeholder="添加新的剧情走向..." rows="2"></textarea><div class="btn-row"><button class="btn-primary" id="summaryEditConfirm">确认并继续</button><button class="btn-secondary" id="summaryEditCancel">取消</button></div></div></div></div>
</div>

<script>
(function() {
    'use strict';
    const CONFIG = {
        STORAGE_KEYS: { API_KEY:'deepseek_api_key_v10',API_URL:'deepseek_api_url_v10',ALL_CHATS:'deepseek_all_chats_v10',CURRENT_CHAT_ID:'deepseek_current_chat_id_v10',TOKEN_STATS:'deepseek_token_stats_v10',SEND_SHORTCUT:'deepseek_send_shortcut_v10',UI_STYLE:'deepseek_ui_style_v10',WECHAT_BG:'deepseek_wechat_bg_v10',DS_BG:'deepseek_ds_bg_v10' },
        DEFAULT_API_URL:'https://api.deepseek.com/v1/chat/completions',MODEL:'deepseek-chat',MAX_TITLE_LENGTH:30,PRICE_INPUT_PER_M:0.14,PRICE_OUTPUT_PER_M:0.28,MAX_MESSAGES_PER_CHAT:500,MAX_FILE_SIZE:10*1024*1024,CONTEXT_WINDOW:128000,DEBOUNCE_SAVE_MS:500
    };
    const state = { allChats:{},currentChatId:null,currentMessages:[],tokenStats:{prompt:0,completion:0},isLoading:false,pendingEdit:null,pendingRegenerate:null,pendingFiles:[],activeContextMessages:[],contextEpoch:0,sendShortcut:'shift+enter',pendingSummary:null,uiStyle:'ds',wechatBg:'',dsBg:'',contextMenuTarget:null };
    const DOM = {};
    function cacheDomElements() {
        const ids = ['messagesContainer','userInput','sendBtn','settingsModal','saveApiBtn','modalCloseBtn','newChatBtn','settingsBtn','menuBtn','sidebar','sidebarOverlay','historyList','apiKeyInput','apiUrlInput','resetTokenBtn','exportBtn','importBtn','importFile','attachBtn','chatFileInput','filePreviewArea','inputWrapper','contextBarFill','reactivatePersonaBtn','summarizeBtn','editConfirmModal','editConfirmYes','editConfirmNo','editConfirmCloseBtn','regenerateModal','regenerateInput','regenerateConfirm','regenerateCancel','regenerateCloseBtn','summarizeModal','summarizeExtraInput','summarizeConfirm','summarizeCancel','summarizeCloseBtn','personaModal','personaModalInput','personaConfirmBtn','personaActivateBtn','personaCancelBtn','personaCloseBtn','shortcutModal','sendShortcutSelect','saveShortcutBtn','shortcutCloseBtn','shortcutSettingsBtn','summaryEditModal','summaryEditInput','summaryEditExtra','summaryEditConfirm','summaryEditCancel','summaryEditCloseBtn','styleToggleBtn','contextMenu','dsHeader','wechatHeader','chatNoteDisplay','inputArea','inputBox','contextBar','personaSummarizeBtn','changeBgBtn','clearBgBtn','bgPreview','bgImageInput','modalTokenUsed','modalTokenCost','modalContextBarFill','mainEl','dragOverlay'];
        ids.forEach(id => { DOM[id] = document.getElementById(id); });
        DOM.tokenUsed = document.querySelector('.token-used'); DOM.tokenRemaining = document.querySelector('.token-remaining');
    }
    const utils = {
        escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;},generateId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);},
        debounce(fn,d){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),d);};},
        showToast(m,d=2000){const e=document.querySelector('.toast');if(e)e.remove();const n=document.createElement('div');n.className='toast';n.textContent=m;document.body.appendChild(n);setTimeout(()=>n.remove(),d);},
        async copyToClipboard(t){try{await navigator.clipboard.writeText(t);return true;}catch{const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.opacity='0';document.body.appendChild(a);a.select();const r=document.execCommand('copy');document.body.removeChild(a);return r;}},
        formatFileSize(b){if(b<1024)return b+' B';if(b<1024*1024)return(b/1024).toFixed(1)+' KB';return(b/(1024*1024)).toFixed(1)+' MB';},
        getFileIcon(n){const e=n.split('.').pop().toLowerCase();const m={js:'📜',ts:'📜',py:'🐍',java:'☕',c:'⚙️',cpp:'⚙️',rs:'🦀',go:'🔵',rb:'💎',php:'🐘',html:'🌐',css:'🎨',json:'📋',xml:'📋',yaml:'📋',md:'📝',txt:'📄',sql:'🗄️',sh:'💻'};return m[e]||'📎';},
        estimateTokens(t){return Math.ceil((t||'').length*0.4);}
    };
    const storage = { get(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){if(e.name==='QuotaExceededError')utils.showToast('存储空间不足');}} };
    const styleManager = {
        load(){state.uiStyle=storage.get(CONFIG.STORAGE_KEYS.UI_STYLE,'ds');state.wechatBg=storage.get(CONFIG.STORAGE_KEYS.WECHAT_BG,'');state.dsBg=storage.get(CONFIG.STORAGE_KEYS.DS_BG,'');this.apply();},
        toggle(){state.uiStyle=state.uiStyle==='ds'?'wechat':'ds';storage.set(CONFIG.STORAGE_KEYS.UI_STYLE,state.uiStyle);this.apply();ui.renderMessages();ui.scrollToBottom();},
        apply(){const w=state.uiStyle==='wechat';DOM.dsHeader.style.display=w?'none':'flex';DOM.wechatHeader.style.display=w?'block':'none';DOM.contextBar.style.display=w?'none':'block';DOM.inputArea.classList.toggle('wechat-input-area',w);DOM.inputBox.classList.toggle('wechat-input-box',w);DOM.styleToggleBtn.textContent=w?'🔄 切换DeepSeek风格':'🔄 切换微信风格';DOM.styleToggleBtn.classList.toggle('active-style',w);DOM.messagesContainer.classList.toggle('wechat-bg',w);if(w&&state.wechatBg)DOM.messagesContainer.style.backgroundImage=`url(${state.wechatBg})`;else if(!w&&state.dsBg)DOM.messagesContainer.style.backgroundImage=`url(${state.dsBg})`;else DOM.messagesContainer.style.backgroundImage='';DOM.userInput.placeholder=shortcutManager.getPlaceholder();this.updateNoteDisplay();this.updateBgPreview();},
        updateNoteDisplay(){if(state.uiStyle!=='wechat')return;const d=document.getElementById('chatNoteDisplay');if(!d)return;if(state.currentChatId&&state.allChats[state.currentChatId]){const n=state.allChats[state.currentChatId].note||state.allChats[state.currentChatId].title||'未命名对话';d.textContent=n;}},
        setBackground(u){if(state.uiStyle==='wechat'){state.wechatBg=u;storage.set(CONFIG.STORAGE_KEYS.WECHAT_BG,u);}else{state.dsBg=u;storage.set(CONFIG.STORAGE_KEYS.DS_BG,u);}this.apply();},
        clearBackground(){if(state.uiStyle==='wechat'){state.wechatBg='';storage.set(CONFIG.STORAGE_KEYS.WECHAT_BG,'');}else{state.dsBg='';storage.set(CONFIG.STORAGE_KEYS.DS_BG,'');}this.apply();},
        updateBgPreview(){if(!DOM.bgPreview)return;const b=state.uiStyle==='wechat'?state.wechatBg:state.dsBg;DOM.bgPreview.style.display='block';DOM.bgPreview.style.backgroundImage=b?`url(${b})`:'';}
    };
    const shortcutManager = {
        load(){state.sendShortcut=storage.get(CONFIG.STORAGE_KEYS.SEND_SHORTCUT,'shift+enter');if(DOM.sendShortcutSelect)DOM.sendShortcutSelect.value=state.sendShortcut;},
        save(v){state.sendShortcut=v;storage.set(CONFIG.STORAGE_KEYS.SEND_SHORTCUT,v);},
        getModifier(){const m={'shift+enter':{shiftKey:true,ctrlKey:false},'ctrl+enter':{shiftKey:false,ctrlKey:true},'enter':{shiftKey:false,ctrlKey:false}};return m[state.sendShortcut]||m['shift+enter'];},
        shouldSend(e){if(e.key!=='Enter')return false;const m=this.getModifier();if(m.shiftKey&&!e.shiftKey)return false;if(m.ctrlKey&&!e.ctrlKey&&!e.metaKey)return false;if(!m.shiftKey&&!m.ctrlKey&&(e.shiftKey||e.ctrlKey||e.metaKey))return false;return true;},
        getPlaceholder(){const m={'shift+enter':'Shift+Enter 发送','ctrl+enter':'Ctrl+Enter 发送','enter':'Enter 发送，Shift+Enter 换行'};return m[state.sendShortcut]||'发送消息';}
    };
    const personaManager = {
        getPersona(){if(!state.currentChatId||!state.allChats[state.currentChatId])return'';return state.allChats[state.currentChatId].persona||'';},
        setPersona(t){if(!state.currentChatId)return;if(!state.allChats[state.currentChatId])return;state.allChats[state.currentChatId].persona=t.trim();chatManager.saveAll();this.updateAvatarStyle();},
        getSystemMessage(){const p=this.getPersona();return p?{role:'system',content:p}:null;},
        updateAvatarStyle(){const p=this.getPersona();document.querySelectorAll('.message.assistant .avatar,.message.wechat-msg.assistant .wechat-avatar').forEach(a=>{if(p)a.classList.add('has-persona');else a.classList.remove('has-persona');});}
    };
    const contextManager = {
        buildApiMessages(){const m=[];const s=personaManager.getSystemMessage();if(s&&state.activeContextMessages.length===0)m.push(s);const n=new Date();const t=n.toLocaleString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long',hour:'2-digit',minute:'2-digit',second:'2-digit'});m.push({role:'system',content:`【当前时间：${t}】`});m.push(...state.activeContextMessages);return m;},
        syncFromDisplayMessages(){state.activeContextMessages=state.currentMessages.filter(m=>m.role!=='divider').map(m=>({role:m.role,content:getMessageContent(m)}));},
        estimateTotalTokens(){let t=0;this.buildApiMessages().forEach(m=>t+=utils.estimateTokens(m.content));return t;},
        updateContextBar(){const u=this.estimateTotalTokens(),p=Math.min((u/CONFIG.CONTEXT_WINDOW)*100,100);[DOM.contextBarFill,DOM.modalContextBarFill].forEach(b=>{if(!b)return;b.style.width=p+'%';b.classList.remove('warning','danger');if(p>90)b.classList.add('danger');else if(p>70)b.classList.add('warning');});}
    };
    const tokenManager = {
        load(){const s=storage.get(CONFIG.STORAGE_KEYS.TOKEN_STATS);if(s)state.tokenStats={prompt:s.prompt||0,completion:s.completion||0};},
        save(){storage.set(CONFIG.STORAGE_KEYS.TOKEN_STATS,state.tokenStats);},
        add(p,c){state.tokenStats.prompt+=p;state.tokenStats.completion+=c;this.save();this.updateDisplay();},
        reset(){state.tokenStats={prompt:0,completion:0};this.save();this.updateDisplay();},
        getCost(){return(state.tokenStats.prompt/1e6)*CONFIG.PRICE_INPUT_PER_M+(state.tokenStats.completion/1e6)*CONFIG.PRICE_OUTPUT_PER_M;},
        getTotal(){return state.tokenStats.prompt+state.tokenStats.completion;},
        updateDisplay(){const t=this.getTotal();if(DOM.tokenUsed)DOM.tokenUsed.innerHTML=`📊 ${t.toLocaleString()}`;if(DOM.tokenRemaining)DOM.tokenRemaining.innerHTML=t>0?`💰 ¥${this.getCost().toFixed(4)}`:'💎 免费';if(DOM.modalTokenUsed)DOM.modalTokenUsed.innerHTML=`📊 ${t.toLocaleString()}`;if(DOM.modalTokenCost)DOM.modalTokenCost.innerHTML=t>0?`💰 ¥${this.getCost().toFixed(4)}`:'💎 免费';}
    };
    const fileManager = {
        async addFiles(files){const n=[];for(const f of files){if(f.size>CONFIG.MAX_FILE_SIZE){utils.showToast(`${f.name} 超过10MB`);continue;}if(f.size===0)continue;try{n.push({name:f.name,size:f.size,content:await this.readFile(f),type:f.type||'text/plain'});}catch{utils.showToast(`读取 ${f.name} 失败`);}}if(n.length>0){state.pendingFiles.push(...n);ui.renderFilePreview();}},
        readFile(f){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=e=>resolve(e.target.result);r.onerror=()=>reject();r.readAsText(f);});},
        remove(i){state.pendingFiles.splice(i,1);ui.renderFilePreview();},clear(){state.pendingFiles=[];ui.renderFilePreview();},
        buildContext(){if(!state.pendingFiles.length)return'';let c='\n\n--- 上传的文件 ---\n';state.pendingFiles.forEach((f,i)=>{c+=`\n[${f.name}]\n\`\`\`\n${f.content}\n\`\`\`\n`;});c+='--- 结束 ---';return c;}
    };
    function createMessage(role,content){return{role,content,versions:[content],currentVersionIndex:0,branchParentId:null,files:[],epoch:state.contextEpoch,_timestamp:Date.now()};}
    function getMessageContent(msg){return msg.versions[msg.currentVersionIndex];}
    function addMessageVersion(msg,c){if(msg.currentVersionIndex<msg.versions.length-1)msg.versions=msg.versions.slice(0,msg.currentVersionIndex+1);msg.versions.push(c);msg.currentVersionIndex=msg.versions.length-1;}
    function switchMessageVersion(msg,d){const n=msg.currentVersionIndex+d;if(n>=0&&n<msg.versions.length){msg.currentVersionIndex=n;return true;}return false;}
    const chatManager = {
        loadAll(){state.allChats=storage.get(CONFIG.STORAGE_KEYS.ALL_CHATS,{});},
        saveAll:utils.debounce(function(){storage.set(CONFIG.STORAGE_KEYS.ALL_CHATS,state.allChats);},CONFIG.DEBOUNCE_SAVE_MS),
        saveCurrent(){if(!state.currentChatId||!state.currentMessages.length)return;const c=state.allChats[state.currentChatId];if(!c)return;if(c.title==='新对话'||!c.title){const f=state.currentMessages.find(m=>m.role==='user');if(f){const t=getMessageContent(f).trim();c.title=t.length>CONFIG.MAX_TITLE_LENGTH?t.slice(0,CONFIG.MAX_TITLE_LENGTH)+'...':t;}}c.messages=state.currentMessages.map(m=>({...m}));c.updatedAt=new Date().toISOString();this.saveAll();styleManager.updateNoteDisplay();},
        create(){const id=utils.generateId();state.allChats[id]={id,title:'新对话',note:'',messages:[],persona:'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};state.contextEpoch=0;state.activeContextMessages=[];this.saveAll();this.switchTo(id);return id;},
        switchTo(id){const c=state.allChats[id];if(!c)return;if(state.currentChatId)this.saveCurrent();state.currentChatId=id;state.currentMessages=(c.messages||[]).map(m=>({...m,epoch:m.epoch||0,_timestamp:m._timestamp||0}));state.contextEpoch=state.currentMessages.length>0?Math.max(...state.currentMessages.map(m=>m.epoch||0)):0;contextManager.syncFromDisplayMessages();storage.set(CONFIG.STORAGE_KEYS.CURRENT_CHAT_ID,id);ui.renderMessages();ui.renderHistory();contextManager.updateContextBar();personaManager.updateAvatarStyle();styleManager.updateNoteDisplay();DOM.userInput.placeholder=shortcutManager.getPlaceholder();ui.scrollToBottom();},
        delete(id){if(Object.keys(state.allChats).length<=1)this.create();delete state.allChats[id];this.saveAll();if(state.currentChatId===id){const r=Object.keys(state.allChats);r.length>0?this.switchTo(r[0]):this.create();}ui.renderHistory();},
        updateNote(note){if(!state.currentChatId||!state.allChats[state.currentChatId])return;state.allChats[state.currentChatId].note=note.trim();this.saveAll();styleManager.updateNoteDisplay();}
    };

        DOM.personaCloseBtn.addEventListener('click',()=>DOM.personaModal.classList.remove('active'));
        DOM.personaModal.addEventListener('click',e=>{if(e.target===DOM.personaModal)DOM.personaModal.classList.remove('active');});
        DOM.personaSummarizeBtn.addEventListener('click',()=>{DOM.personaModal.classList.remove('active');state.pendingSummary=null;DOM.summarizeExtraInput.value='';DOM.summarizeModal.classList.add('active');setTimeout(()=>DOM.summarizeExtraInput.focus(),100);});
        DOM.reactivatePersonaBtn.addEventListener('click',()=>chatActions.reactivatePersona());
        DOM.summarizeBtn.addEventListener('click',()=>{state.pendingSummary=null;DOM.summarizeExtraInput.value='';DOM.summarizeModal.classList.add('active');setTimeout(()=>DOM.summarizeExtraInput.focus(),100);});
        DOM.newChatBtn.addEventListener('click',()=>{chatManager.create();if(window.innerWidth<=768)ui.toggleSidebar(false);});
        DOM.resetTokenBtn.addEventListener('click',()=>{if(confirm('确定重置？')){tokenManager.reset();utils.showToast('已重置');}});
        DOM.exportBtn.addEventListener('click',()=>dataManager.exportData());DOM.importBtn.addEventListener('click',()=>DOM.importFile.click());
        DOM.importFile.addEventListener('change',e=>{if(e.target.files[0])dataManager.importData(e.target.files[0]);});
        DOM.editConfirmYes.addEventListener('click',()=>{DOM.editConfirmModal.classList.remove('active');const idx=state.pendingEdit?.index;state.pendingEdit=null;if(idx!==undefined&&idx!==null)ui.doEditMessage(idx,true);});
        DOM.editConfirmNo.addEventListener('click',()=>{DOM.editConfirmModal.classList.remove('active');const idx=state.pendingEdit?.index;state.pendingEdit=null;if(idx!==undefined&&idx!==null)ui.doEditMessage(idx,false);});
        DOM.editConfirmCloseBtn.addEventListener('click',()=>{DOM.editConfirmModal.classList.remove('active');state.pendingEdit=null;});
        DOM.editConfirmModal.addEventListener('click',e=>{if(e.target===DOM.editConfirmModal){DOM.editConfirmModal.classList.remove('active');state.pendingEdit=null;}});
        DOM.regenerateConfirm.addEventListener('click',()=>{DOM.regenerateModal.classList.remove('active');if(state.pendingRegenerate)chatActions.regenerate(state.pendingRegenerate.userIndex,state.pendingRegenerate.assistantIndex,DOM.regenerateInput.value.trim());state.pendingRegenerate=null;});
        DOM.regenerateCancel.addEventListener('click',()=>{DOM.regenerateModal.classList.remove('active');state.pendingRegenerate=null;});
        DOM.regenerateCloseBtn.addEventListener('click',()=>{DOM.regenerateModal.classList.remove('active');state.pendingRegenerate=null;});
        DOM.regenerateModal.addEventListener('click',e=>{if(e.target===DOM.regenerateModal){DOM.regenerateModal.classList.remove('active');state.pendingRegenerate=null;}});
        DOM.summarizeConfirm.addEventListener('click',()=>{DOM.summarizeModal.classList.remove('active');chatActions.summarizeContext(DOM.summarizeExtraInput.value.trim());});
        DOM.summarizeCancel.addEventListener('click',()=>{DOM.summarizeModal.classList.remove('active');state.pendingSummary=null;});
        DOM.summarizeCloseBtn.addEventListener('click',()=>{DOM.summarizeModal.classList.remove('active');state.pendingSummary=null;});
        DOM.summarizeModal.addEventListener('click',e=>{if(e.target===DOM.summarizeModal){DOM.summarizeModal.classList.remove('active');state.pendingSummary=null;}});
        DOM.summaryEditConfirm.addEventListener('click',()=>{DOM.summaryEditModal.classList.remove('active');chatActions.confirmSummary(DOM.summaryEditInput.value,DOM.summaryEditExtra.value);});
        DOM.summaryEditCancel.addEventListener('click',()=>{DOM.summaryEditModal.classList.remove('active');state.pendingSummary=null;});
        DOM.summaryEditCloseBtn.addEventListener('click',()=>{DOM.summaryEditModal.classList.remove('active');state.pendingSummary=null;});
        DOM.summaryEditModal.addEventListener('click',e=>{if(e.target===DOM.summaryEditModal){DOM.summaryEditModal.classList.remove('active');state.pendingSummary=null;}});
        DOM.contextMenu.querySelector('[data-action="copy"]').addEventListener('click',async()=>{if(state.contextMenuTarget&&await utils.copyToClipboard(state.contextMenuTarget.content))utils.showToast('已复制');DOM.contextMenu.classList.remove('active');});
        DOM.contextMenu.querySelector('[data-action="edit"]').addEventListener('click',()=>{if(state.contextMenuTarget&&state.contextMenuTarget.role==='user')ui.startEditMessage(state.contextMenuTarget.index);DOM.contextMenu.classList.remove('active');});
        DOM.changeBgBtn.addEventListener('click',()=>DOM.bgImageInput.click());
        DOM.clearBgBtn.addEventListener('click',()=>{styleManager.clearBackground();utils.showToast('背景已清除');});
        DOM.bgImageInput.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;if(!f.type.startsWith('image/')){utils.showToast('请选择图片文件');return;}const r=new FileReader();r.onload=ev=>{styleManager.setBackground(ev.target.result);utils.showToast('背景已更新');};r.readAsDataURL(f);DOM.bgImageInput.value='';});
        DOM.bgPreview.addEventListener('dragover',e=>{e.preventDefault();DOM.bgPreview.style.opacity='0.6';});
        DOM.bgPreview.addEventListener('dragleave',e=>{e.preventDefault();DOM.bgPreview.style.opacity='1';});
        DOM.bgPreview.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();DOM.bgPreview.style.opacity='1';const f=e.dataTransfer.files[0];if(!f||!f.type.startsWith('image/')){utils.showToast('请拖入图片文件');return;}const r=new FileReader();r.onload=ev=>{styleManager.setBackground(ev.target.result);utils.showToast('背景已更新');};r.readAsDataURL(f);});
        setupNoteEditing();
        document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();DOM.settingsModal.classList.add('active');}if(e.key==='Escape')closeAllModals();});
        document.addEventListener('click',()=>DOM.contextMenu.classList.remove('active'));
        window.addEventListener('resize',()=>{if(window.innerWidth>768)ui.toggleSidebar(false);});
    }
    function init(){cacheDomElements();tokenManager.load();tokenManager.updateDisplay();shortcutManager.load();styleManager.load();chatManager.loadAll();const sid=storage.get(CONFIG.STORAGE_KEYS.CURRENT_CHAT_ID);if(sid&&state.allChats[sid])chatManager.switchTo(sid);else if(Object.keys(state.allChats).length>0)chatManager.switchTo(Object.keys(state.allChats)[0]);else chatManager.create();const ak=storage.get(CONFIG.STORAGE_KEYS.API_KEY,''),au=storage.get(CONFIG.STORAGE_KEYS.API_URL,CONFIG.DEFAULT_API_URL);if(ak)DOM.apiKeyInput.value=ak;if(au)DOM.apiUrlInput.value=au;DOM.userInput.placeholder=shortcutManager.getPlaceholder();ui.renderHistory();contextManager.updateContextBar();personaManager.updateAvatarStyle();bindEvents();DOM.userInput.focus();}
    document.addEventListener('DOMContentLoaded',init);
})();
</script>
</body>
</html>
