<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0f0f0f;
            height: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            background: #0f0f0f;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a2a;
            transition: transform 0.3s ease;
            z-index: 20;
            height: 100%;
        }

        .sidebar-header {
            padding: 16px 12px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .new-chat-btn:active {
            background: #252525;
        }

        .history-list {
            flex: 1;
            padding: 8px 12px;
            overflow-y: auto;
        }

        .history-date {
            padding: 12px 8px 4px;
            font-size: 12px;
            color: #6b6b6b;
        }

        .history-item {
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: 10px;
            color: #d0d0d0;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            background: #1a1a1a;
        }

        .history-item.active {
            background: #1a1a1a;
            color: #10a37f;
        }

        .history-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-chat {
            background: transparent;
            border: none;
            color: #6b6b6b;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            display: none;
        }

        .history-item:hover .delete-chat {
            display: block;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #2a2a2a;
        }

        .settings-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: #8e8e8e;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .settings-btn:active {
            background: #1a1a1a;
            color: #e0e0e0;
        }

        /* 主区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            min-width: 0;
            height: 100%;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: none;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .model-tag {
            font-size: 12px;
            color: #6b6b6b;
            background: #1a1a1a;
            padding: 2px 8px;
            border-radius: 12px;
        }

        /* Token 显示区域 */
        .token-stats {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
        }

        .token-used {
            color: #10a37f;
        }

        .token-remaining {
            color: #ffb74d;
        }

        .token-reset {
            background: transparent;
            border: none;
            color: #6b6b6b;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
        }

        .token-reset:active {
            color: #e0e0e0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            min-height: 0;
        }

        .welcome-message {
            text-align: center;
            padding: 80px 20px;
        }

        .welcome-message h1 {
            color: #e0e0e0;
            font-size: 28px;
            margin-bottom: 12px;
        }

        .welcome-message p {
            color: #6b6b6b;
        }

        .message {
            display: flex;
            padding: 20px 16px;
        }

        .message.user {
            background: #0f0f0f;
        }

        .message.assistant {
            background: #1a1a1a;
        }

        .message-content {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #10a37f;
        }

        .message.assistant .avatar {
            background: #2a2a2a;
        }

        .text {
            flex: 1;
            color: #e0e0e0;
            line-height: 1.5;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-actions {
            display: flex;
            gap: 12px;
            margin-left: 44px;
            margin-top: 8px;
        }

        .action-btn {
            background: #2a2a2a;
            border: none;
            color: #8e8e8e;
            cursor: pointer;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
        }

        .action-btn:active {
            background: #3a3a3a;
        }

        .edit-textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #10a37f;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            padding: 12px;
            resize: vertical;
        }

        .edit-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .edit-save {
            background: #10a37f;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .edit-cancel {
            background: #2a2a2a;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: #8e8e8e;
            cursor: pointer;
        }

        .input-area {
            padding: 12px 16px 20px;
            background: #0f0f0f;
            flex-shrink: 0;
            border-top: 1px solid #2a2a2a;
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        textarea {
            width: 100%;
            padding: 12px 48px 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 28px;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #10a37f;
        }

        .send-icon {
            position: absolute;
            right: 12px;
            bottom: 10px;
            background: #2a2a2a;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: #8e8e8e;
            cursor: pointer;
            font-size: 16px;
        }

        .send-icon:active {
            background: #10a37f;
            color: white;
        }

        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #4a4a4a;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: #1a1a1a;
            border-radius: 16px;
            width: 420px;
            max-width: 90%;
            border: 1px solid #2a2a2a;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #e0e0e0;
            font-size: 18px;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: #8e8e8e;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-body label {
            display: block;
            color: #8e8e8e;
            font-size: 13px;
            margin: 12px 0 6px;
        }

        .modal-body input {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #10a37f;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .hint {
            font-size: 11px;
            color: #4a4a4a;
            margin-top: 12px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
            }

            .sidebar.mobile-visible {
                transform: translateX(0);
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 15;
                display: none;
            }

            .overlay.active {
                display: block;
            }
            
            .message-actions {
                margin-left: 44px;
            }
            
            .token-stats {
                font-size: 10px;
                padding: 4px 10px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">+ 新对话</button>
            </div>
            <div class="history-list" id="historyList"></div>
            <div class="sidebar-footer">
                <button class="settings-btn" id="settingsBtn">⚙️ 设置</button>
            </div>
        </aside>

        <main class="main">
            <header class="chat-header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="header-title">
                    <span>DeepSeek</span>
                    <span class="model-tag">V3</span>
                </div>
                <div class="token-stats" id="tokenStats">
                    <span class="token-used">📊 0</span>
                    <span class="token-remaining">💎 免费</span>
                    <button class="token-reset" id="resetTokenBtn">↺</button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <h1>你好，我是 DeepSeek</h1>
                    <p>有什么我可以帮你的吗？</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <textarea id="userInput" placeholder="发送消息" rows="1"></textarea>
                    <button id="sendBtn" class="send-icon">➤</button>
                </div>
                <p class="disclaimer">内容由AI生成，仅供参考</p>
            </div>
        </main>

        <div id="settingsModal" class="modal">
            <div class="modal-card">
                <div class="modal-header">
                    <h3>API 设置</h3>
                    <button class="modal-close" id="modalCloseBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <label>API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="sk-...">
                    <label>API 地址</label>
                    <input type="text" id="apiUrlInput" value="https://api.deepseek.com/v1/chat/completions">
                    <button class="save-btn" id="saveApiBtn">保存</button>
                    <p class="hint">💡 API Key 只保存在你的浏览器中</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 存储键名
        const STORAGE_KEYS = {
            API_KEY: 'deepseek_api_key',
            API_URL: 'deepseek_api_url',
            ALL_CHATS: 'deepseek_all_chats',
            CURRENT_CHAT_ID: 'deepseek_current_chat_id',
            TOTAL_TOKENS: 'deepseek_total_tokens'
        };

        // DeepSeek 价格（每百万tokens）
        // 输入: 0.14元，输出: 0.28元
        const PRICE_INPUT_PER_M = 0.14;
        const PRICE_OUTPUT_PER_M = 0.28;

        // 数据结构
        let allChats = {};
        let currentChatId = null;
        let currentMessages = [];
        let isRegenerating = false;
        
        // Token 统计
        let totalPromptTokens = 0;      // 累计输入 token
        let totalCompletionTokens = 0;   // 累计输出 token

        // DOM 元素
        let messagesContainer, userInput, sendBtn, apiKeyInput, apiUrlInput;
        let settingsModal, saveApiBtn, modalCloseBtn, newChatBtn, settingsBtn;
        let menuBtn, sidebar, overlay, historyList;
        let tokenUsedSpan, tokenRemainingSpan, resetTokenBtn;

        document.addEventListener('DOMContentLoaded', () => {
            messagesContainer = document.getElementById('messagesContainer');
            userInput = document.getElementById('userInput');
            sendBtn = document.getElementById('sendBtn');
            settingsModal = document.getElementById('settingsModal');
            saveApiBtn = document.getElementById('saveApiBtn');
            modalCloseBtn = document.getElementById('modalCloseBtn');
            newChatBtn = document.getElementById('newChatBtn');
            settingsBtn = document.getElementById('settingsBtn');
            menuBtn = document.getElementById('menuBtn');
            sidebar = document.getElementById('sidebar');
            historyList = document.getElementById('historyList');
            apiKeyInput = document.getElementById('apiKeyInput');
            apiUrlInput = document.getElementById('apiUrlInput');
            tokenUsedSpan = document.querySelector('.token-used');
            tokenRemainingSpan = document.querySelector('.token-remaining');
            resetTokenBtn = document.getElementById('resetTokenBtn');

            if (window.innerWidth <= 768) {
                overlay = document.createElement('div');
                overlay.className = 'overlay';
                document.body.appendChild(overlay);
                overlay.addEventListener('click', toggleSidebar);
            }

            // 加载API设置
            const savedApiKey = localStorage.getItem(STORAGE_KEYS.API_KEY);
            const savedApiUrl = localStorage.getItem(STORAGE_KEYS.API_URL);
            if (savedApiKey) apiKeyInput.value = savedApiKey;
            if (savedApiUrl) apiUrlInput.value = savedApiUrl;

            // 加载 Token 统计
            loadTokenStats();
            updateTokenDisplay();

            // 加载所有对话
            loadAllChats();
            
            // 加载当前对话ID
            const savedChatId = localStorage.getItem(STORAGE_KEYS.CURRENT_CHAT_ID);
            if (savedChatId && allChats[savedChatId]) {
                switchToChat(savedChatId);
            } else if (Object.keys(allChats).length > 0) {
                const firstChatId = Object.keys(allChats)[0];
                switchToChat(firstChatId);
            } else {
                createNewChat();
            }

            renderHistoryList();

            // 事件绑定
            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            if (menuBtn) menuBtn.addEventListener('click', toggleSidebar);

            settingsBtn.addEventListener('click', () => {
                settingsModal.style.display = 'flex';
            });

            saveApiBtn.addEventListener('click', () => {
                const apiKey = apiKeyInput.value.trim();
                const apiUrl = apiUrlInput.value.trim();
                if (apiKey) localStorage.setItem(STORAGE_KEYS.API_KEY, apiKey);
                if (apiUrl) localStorage.setItem(STORAGE_KEYS.API_URL, apiUrl);
                settingsModal.style.display = 'none';
                alert('API 设置已保存！');
            });

            modalCloseBtn.onclick = () => settingsModal.style.display = 'none';
            window.onclick = (e) => {
                if (e.target === settingsModal) settingsModal.style.display = 'none';
            };

            newChatBtn.addEventListener('click', () => {
                createNewChat();
                if (window.innerWidth <= 768) toggleSidebar();
            });

            // 重置 Token 统计
            resetTokenBtn.addEventListener('click', () => {
                if (confirm('确定要重置 Token 统计吗？')) {
                    totalPromptTokens = 0;
                    totalCompletionTokens = 0;
                    saveTokenStats();
                    updateTokenDisplay();
                }
            });

            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        });

        // 更新 Token 显示
        function updateTokenDisplay() {
            const totalTokens = totalPromptTokens + totalCompletionTokens;
            const cost = (totalPromptTokens / 1000000 * PRICE_INPUT_PER_M + 
                         totalCompletionTokens / 1000000 * PRICE_OUTPUT_PER_M).toFixed(4);
            
            tokenUsedSpan.innerHTML = `📊 ${totalTokens.toLocaleString()}`;
            
            // 显示预估费用（单位：元）
            if (totalTokens > 0) {
                tokenRemainingSpan.innerHTML = `💰 ¥${cost}`;
            } else {
                tokenRemainingSpan.innerHTML = `💎 免费`;
            }
        }

        // 保存 Token 统计
        function saveTokenStats() {
            localStorage.setItem(STORAGE_KEYS.TOTAL_TOKENS, JSON.stringify({
                prompt: totalPromptTokens,
                completion: totalCompletionTokens
            }));
        }

        // 加载 Token 统计
        function loadTokenStats() {
            const saved = localStorage.getItem(STORAGE_KEYS.TOTAL_TOKENS);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    totalPromptTokens = data.prompt || 0;
                    totalCompletionTokens = data.completion || 0;
                } catch(e) {}
            }
        }

        // 累加 Token
        function addTokens(promptTokens, completionTokens) {
            totalPromptTokens += promptTokens;
            totalCompletionTokens += completionTokens;
            saveTokenStats();
            updateTokenDisplay();
        }

        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-visible');
                if (overlay) overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('hidden');
            }
        }

        function createNewChat() {
            const chatId = Date.now().toString();
            const now = new Date().toISOString();
            allChats[chatId] = {
                id: chatId,
                title: '新对话',
                messages: [],
                createdAt: now,
                updatedAt: now
            };
            saveAllChats();
            switchToChat(chatId);
            renderHistoryList();
        }

        function switchToChat(chatId) {
            if (!allChats[chatId]) return;
            
            currentChatId = chatId;
            currentMessages = [...allChats[chatId].messages];
            localStorage.setItem(STORAGE_KEYS.CURRENT_CHAT_ID, chatId);
            
            if (currentMessages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="welcome-message">
                        <h1>你好，我是 DeepSeek</h1>
                        <p>有什么我可以帮你的吗？</p>
                    </div>
                `;
            } else {
                messagesContainer.innerHTML = '';
                for (let i = 0; i < currentMessages.length; i++) {
                    const msg = currentMessages[i];
                    addMessageToUI(msg.content, msg.role, i);
                }
            }
            
            renderHistoryList();
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            if (Object.keys(allChats).length === 1) {
                createNewChat();
            }
            delete allChats[chatId];
            saveAllChats();
            
            if (currentChatId === chatId) {
                const remainingIds = Object.keys(allChats);
                if (remainingIds.length > 0) {
                    switchToChat(remainingIds[0]);
                } else {
                    createNewChat();
                }
            }
            renderHistoryList();
        }

        function renderHistoryList() {
            if (!historyList) return;
            
            const chats = Object.values(allChats).sort((a, b) => 
                new Date(b.updatedAt) - new Date(a.updatedAt)
            );
            
            const now = new Date();
            const todayStr = now.toDateString();
            const yesterdayStr = new Date(now.setDate(now.getDate() - 1)).toDateString();
            now.setDate(now.getDate() + 1);
            
            const today = [];
            const yesterday = [];
            const older = [];
            
            chats.forEach(chat => {
                const chatDate = new Date(chat.updatedAt).toDateString();
                if (chatDate === todayStr) {
                    today.push(chat);
                } else if (chatDate === yesterdayStr) {
                    yesterday.push(chat);
                } else {
                    older.push(chat);
                }
            });
            
            let html = '';
            
            if (today.length > 0) {
                html += '<div class="history-date">今天</div>';
                today.forEach(chat => {
                    html += renderHistoryItem(chat);
                });
            }
            
            if (yesterday.length > 0) {
                html += '<div class="history-date">昨天</div>';
                yesterday.forEach(chat => {
                    html += renderHistoryItem(chat);
                });
            }
            
            if (older.length > 0) {
                html += '<div class="history-date">更早</div>';
                older.forEach(chat => {
                    html += renderHistoryItem(chat);
                });
            }
            
            historyList.innerHTML = html;
            
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-chat')) return;
                    const chatId = item.dataset.id;
                    if (chatId) switchToChat(chatId);
                    if (window.innerWidth <= 768) toggleSidebar();
                });
            });
        }
        
        function renderHistoryItem(chat) {
            const isActive = currentChatId === chat.id;
            const title = chat.title || '新对话';
            return `
                <div class="history-item ${isActive ? 'active' : ''}" data-id="${chat.id}">
                    <span class="history-title">${escapeHtml(title)}</span>
                    <button class="delete-chat" onclick="deleteChat('${chat.id}', event)">🗑️</button>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveCurrentChat() {
            if (!currentChatId) return;
            
            if (currentMessages.length > 0) {
                const firstUserMsg = currentMessages.find(m => m.role === 'user');
                if (firstUserMsg && allChats[currentChatId].title === '新对话') {
                    const title = firstUserMsg.content.slice(0, 30) + (firstUserMsg.content.length > 30 ? '...' : '');
                    allChats[currentChatId].title = title;
                }
            }
            
            allChats[currentChatId] = {
                ...allChats[currentChatId],
                messages: [...currentMessages],
                updatedAt: new Date().toISOString()
            };
            saveAllChats();
            renderHistoryList();
        }

        function saveAllChats() {
            localStorage.setItem(STORAGE_KEYS.ALL_CHATS, JSON.stringify(allChats));
        }

        function loadAllChats() {
            const saved = localStorage.getItem(STORAGE_KEYS.ALL_CHATS);
            if (saved) {
                allChats = JSON.parse(saved);
            } else {
                allChats = {};
            }
        }

        async function sendMessage(editedMessage = null, editIndex = null) {
            let message;
            
            if (editedMessage !== null && editIndex !== null) {
                message = editedMessage;
                currentMessages[editIndex].content = message;
                currentMessages = currentMessages.slice(0, editIndex + 1);
                rerenderMessages();
            } else {
                message = userInput.value.trim();
                if (!message) return;
                userInput.value = '';
                userInput.style.height = 'auto';
                
                if (messagesContainer.querySelector('.welcome-message')) {
                    messagesContainer.innerHTML = '';
                }
                
                addMessageToUI(message, 'user');
                currentMessages.push({ role: 'user', content: message });
                saveCurrentChat();
            }

            const apiKey = localStorage.getItem(STORAGE_KEYS.API_KEY);
            if (!apiKey) {
                alert('请先在设置中配置 API Key');
                settingsModal.style.display = 'flex';
                return;
            }

            const loadingId = addLoadingMessage();

            try {
                const result = await callDeepSeekAPI(currentMessages);
                removeLoadingMessage(loadingId);
                
                // 累加 Token
                addTokens(result.promptTokens, result.completionTokens);
                
                addMessageToUI(result.content, 'assistant');
                currentMessages.push({ role: 'assistant', content: result.content });
                saveCurrentChat();
            } catch (error) {
                removeLoadingMessage(loadingId);
                addMessageToUI('错误: ' + error.message, 'assistant');
                console.error(error);
            }
        }

        async function regenerateLastResponse() {
            if (isRegenerating) return;
            isRegenerating = true;

            let lastUserIndex = -1;
            for (let i = currentMessages.length - 1; i >= 0; i--) {
                if (currentMessages[i].role === 'user') {
                    lastUserIndex = i;
                    break;
                }
            }

            if (lastUserIndex === -1) {
                isRegenerating = false;
                return;
            }

            currentMessages = currentMessages.slice(0, lastUserIndex + 1);
            rerenderMessages();

            const apiKey = localStorage.getItem(STORAGE_KEYS.API_KEY);
            if (!apiKey) {
                alert('请先在设置中配置 API Key');
                settingsModal.style.display = 'flex';
                isRegenerating = false;
                return;
            }

            const loadingId = addLoadingMessage();

            try {
                const result = await callDeepSeekAPI(currentMessages);
                removeLoadingMessage(loadingId);
                
                // 重新生成也会消耗 token，需要累加
                addTokens(result.promptTokens, result.completionTokens);
                
                addMessageToUI(result.content, 'assistant');
                currentMessages.push({ role: 'assistant', content: result.content });
                saveCurrentChat();
            } catch (error) {
                removeLoadingMessage(loadingId);
                addMessageToUI('错误: ' + error.message, 'assistant');
            }

            isRegenerating = false;
        }

        function editUserMessage(index, content) {
            const messageDiv = document.querySelector(`.message[data-index="${index}"]`);
            if (!messageDiv) return;
            
            const textDiv = messageDiv.querySelector('.text');
            const originalContent = textDiv.textContent;
            
            const textarea = document.createElement('textarea');
            textarea.className = 'edit-textarea';
            textarea.value = originalContent;
            textarea.rows = 3;
            
            const editActions = document.createElement('div');
            editActions.className = 'edit-actions';
            
            const saveBtn = document.createElement('button');
            saveBtn.textContent = '保存并重新发送';
            saveBtn.className = 'edit-save';
            
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = '取消';
            cancelBtn.className = 'edit-cancel';
            
            editActions.appendChild(saveBtn);
            editActions.appendChild(cancelBtn);
            
            textDiv.style.display = 'none';
            textDiv.parentElement.appendChild(textarea);
            textDiv.parentElement.appendChild(editActions);
            
            saveBtn.onclick = async () => {
                const newContent = textarea.value.trim();
                if (!newContent) return;
                
                textarea.remove();
                editActions.remove();
                textDiv.style.display = 'block';
                
                await sendMessage(newContent, index);
            };
            
            cancelBtn.onclick = () => {
                textarea.remove();
                editActions.remove();
                textDiv.style.display = 'block';
            };
        }

        function rerenderMessages() {
            messagesContainer.innerHTML = '';
            for (let i = 0; i < currentMessages.length; i++) {
                const msg = currentMessages[i];
                addMessageToUI(msg.content, msg.role, i);
            }
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function callDeepSeekAPI(messages) {
            const apiKey = localStorage.getItem(STORAGE_KEYS.API_KEY);
            const apiUrl = localStorage.getItem(STORAGE_KEYS.API_URL);

            const requestBody = {
                model: 'deepseek-chat',
                messages: messages,
                stream: false,
                temperature: 0.7
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || '请求失败');
            }

            const data = await response.json();
            
            // 提取 token 用量
            const promptTokens = data.usage?.prompt_tokens || 0;
            const completionTokens = data.usage?.completion_tokens || 0;
            const content = data.choices[0].message.content;
            
            return {
                content: content,
                promptTokens: promptTokens,
                completionTokens: completionTokens
            };
        }

        function addMessageToUI(content, type, index = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            
            const finalIndex = (index !== null) ? index : currentMessages.length;
            messageDiv.setAttribute('data-index', finalIndex);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const rowDiv = document.createElement('div');
            rowDiv.className = 'message-row';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = type === 'user' ? '👤' : '✨';

            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.textContent = content;

            rowDiv.appendChild(avatar);
            rowDiv.appendChild(textDiv);
            contentDiv.appendChild(rowDiv);
            
            if (content !== '思考中...') {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                
                if (type === 'assistant') {
                    const regenerateBtn = document.createElement('button');
                    regenerateBtn.textContent = '🔄 重新生成';
                    regenerateBtn.className = 'action-btn regenerate';
                    regenerateBtn.onclick = (e) => {
                        e.stopPropagation();
                        regenerateLastResponse();
                    };
                    actionsDiv.appendChild(regenerateBtn);
                } else if (type === 'user') {
                    const editBtn = document.createElement('button');
                    editBtn.textContent = '✏️ 编辑';
                    editBtn.className = 'action-btn edit';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        const msgIndex = parseInt(messageDiv.getAttribute('data-index'));
                        editUserMessage(msgIndex, content);
                    };
                    actionsDiv.appendChild(editBtn);
                }
                
                contentDiv.appendChild(actionsDiv);
            }
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return messageDiv;
        }

        function addLoadingMessage() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading-message-' + Date.now();

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const rowDiv = document.createElement('div');
            rowDiv.className = 'message-row';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '✨';

            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.textContent = '思考中...';

            rowDiv.appendChild(avatar);
            rowDiv.appendChild(textDiv);
            contentDiv.appendChild(rowDiv);
            loadingDiv.appendChild(contentDiv);

            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            return loadingDiv.id;
        }

        function removeLoadingMessage(loadingId) {
            const loadingElement = document.getElementById(loadingId);
            if (loadingElement && loadingElement.parentNode) {
                loadingElement.remove();
            }
        }

        window.deleteChat = deleteChat;
    </script>
</body>
</html>
